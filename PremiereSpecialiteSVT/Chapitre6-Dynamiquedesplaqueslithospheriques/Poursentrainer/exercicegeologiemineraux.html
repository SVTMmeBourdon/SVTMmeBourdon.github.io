<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reconnaissance de minéraux au microscope polarisant </title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    
    <style>
        :root {
            --primary: #2dd4bf; /* Teal pour un look "nature/géo" */
            --secondary: #3b82f6;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --success: #10b981;
            --error: #f43f5e;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 95%;
            max-width: 800px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h1 {
            background: linear-gradient(135deg, #2dd4bf, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2rem;
            margin: 0 0 1.5rem 0;
        }

        #timer-bar {
            width: 100%;
            height: 10px;
            background: #334155;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        #timer-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            transition: width 0.05s linear;
        }

        .question-box {
            font-size: 1.1rem;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .description-text {
            color: #cbd5e1;
            font-style: italic;
            margin-bottom: 0.5rem;
        }

        .criteria {
            font-weight: bold;
            color: #fff;
        }

        #feedback {
            height: 25px;
            margin-bottom: 1rem;
            font-weight: bold;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        button {
            padding: 1rem;
            font-size: 1.1rem;
            border: none;
            border-radius: 0.75rem;
            background: #334155;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        button:hover:not(:disabled) {
            background: #475569;
            transform: translateY(-2px);
        }

        .correct { background: var(--success) !important; box-shadow: 0 0 15px var(--success); }
        .wrong { background: var(--error) !important; animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .score-board { margin-top: 2rem; font-size: 0.9rem; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <h1>Entrainement à la reconnaissance de minéraux au microscope polarisant</h1>
    <div id="timer-bar"><div id="timer-fill"></div></div>
    
    <div id="feedback"></div>

    <div class="question-box" id="question">Initialisation du microscope...</div>

    <div class="options-grid" id="options"></div>

    <div class="score-board">
        Score : <span id="score" style="color:white">0</span> | 
        Record : <span id="highscore" style="color:white">0</span>
    </div>
</div>

<script>
    // Données issues de votre document
    const questionsPool = [
        { 
            name: "Biotite (Mica noir)", 
            desc: "LPNA : Coloration brune variable quand on tourne la platine , 1 clivage parallèle à l'allongement. <br> LPA : Teintes vives souvent masquées." 
        },
        { 
            name: "Quartz", 
            desc: "LPNA : Relief négatif, translucide, impression de vide. <br> LPA : Teintes gris/bleu, extinction roulante, forme en 'pièces de puzzle'." 
        },
        { 
            name: "Plagioclase", 
            desc: "LPNA : Relief modéré, aspect sale, incolore. <br> LPA : Macles en 'code-barres' (alternance bandes sombres/claires)." 
        },
        { 
            name: "Orthose", 
            desc: "LPNA : Relief modéré, aspect sale, incolore. <br> LPA : Teintes grises ternes, parfois macle simple." 
        },
        { 
            name: "Pyroxène", 
            desc: "LPNA : Fort relief, 2 clivages à 90°. <br> LPA : Teintes vives (jaune/orange)." 
        },
        { 
            name: "Olivine", 
            desc: "LPNA : Fort relief, nombreuses cassures, pas de clivage, verdâtre. <br> LPA : Teintes vives (bleu, vert, rose)." 
        },
        { 
            name: "Amphibole", 
            desc: "LPNA : Relief assez fort, si vert = hornblende, si bleu = glaucophane, 2 clivages à 120°/60°. <br> LPA : Teintes vives." 
        },
        { 
            name: "Grenat", 
            desc: "LPNA : Relief assez fort, craquelé, forme sub-hexagonale, rose pâle. <br> LPA : Toujours éteint (noir)." 
        }
    ];

    let currentScore = 0;
    let highscore = 0;
    let timer;
    const TIME_LIMIT = 30000; // 30 secondes par minéral

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function nextQuestion() {
        clearInterval(timer);
        document.getElementById('feedback').innerText = "";
        
        // Choisir un minéral au hasard
        const correctMineral = questionsPool[Math.floor(Math.random() * questionsPool.length)];
        
        // Créer les options (le bon + 3 faux au hasard)
        let options = [correctMineral.name];
        let others = questionsPool.filter(m => m.name !== correctMineral.name);
        shuffle(others);
        options.push(others[0].name, others[1].name, others[2].name);
        shuffle(options);

        // Affichage
        document.getElementById('question').innerHTML = `
            <div class="description-text">Quel minéral correspond à cette description ?</div>
            <div class="criteria">${correctMineral.desc}</div>
        `;
        
        const optEl = document.getElementById('options');
        optEl.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, correctMineral.name, btn);
            optEl.appendChild(btn);
        });

        startTimer();
    }

    function startTimer() {
        let timeLeft = TIME_LIMIT;
        const fill = document.getElementById('timer-fill');
        timer = setInterval(() => {
            timeLeft -= 50;
            fill.style.width = (timeLeft / TIME_LIMIT * 100) + '%';
            if (timeLeft <= 0) gameOver("Temps écoulé !");
        }, 50);
    }

    function checkAnswer(selected, correct, btn) {
        clearInterval(timer);
        const buttons = document.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);

        const feedbackEl = document.getElementById('feedback');

        if (selected === correct) {
            btn.classList.add('correct');
            feedbackEl.innerText = "Correct !";
            feedbackEl.style.color = "var(--success)";
            currentScore++;
            document.getElementById('score').innerText = currentScore;
            setTimeout(nextQuestion, 1200);
        } else {
            btn.classList.add('wrong');
            feedbackEl.innerText = "Erreur !";
            feedbackEl.style.color = "var(--error)";
            buttons.forEach(b => {
                if(b.innerText === correct) b.classList.add('correct');
            });
            setTimeout(() => gameOver("Ce n'était pas le bon minéral."), 1800);
        }
    }

    function gameOver(msg) {
        if (currentScore > highscore) highscore = currentScore;
        document.getElementById('highscore').innerText = highscore;
        alert(msg + "\nScore final : " + currentScore);
        currentScore = 0;
        document.getElementById('score').innerText = 0;
        nextQuestion();
    }

    window.onload = nextQuestion;
</script>

</body>
</html>
